<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AgriPulse — Crop, Stress &amp; Irrigation Advisory</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
  :root { --bg:#0e1512; --panel:#16211c; --line:#24332c; --text:#e6efe9; --muted:#8fa89b; --accent:#4caf7d; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--text); font:14px/1.5 'Segoe UI',system-ui,sans-serif; padding:18px; }
  header { display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; margin-bottom:16px; }
  h1 { font-size:22px; } h1 span { color:var(--accent); }
  .sub { color:var(--muted); font-size:13px; }
  .badge { background:#1e3a2c; color:#7fd6a4; border-radius:12px; padding:2px 10px; font-size:12px; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:16px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:12px 14px; }
  .card .v { font-size:24px; font-weight:600; margin-top:2px; }
  .card .l { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
  .grid { display:grid; grid-template-columns:1.25fr 1fr; gap:14px; }
  @media (max-width:980px){ .grid{grid-template-columns:1fr} }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px; }
  .panel h2 { font-size:14px; color:var(--muted); margin-bottom:10px; text-transform:uppercase; letter-spacing:.05em; }
  #map { height:440px; border-radius:8px; background:#0a0f0c; }
  .tabs { display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
  .tabs button { background:#1c2a23; border:1px solid var(--line); color:var(--text); padding:5px 12px; border-radius:16px; cursor:pointer; font-size:13px; }
  .tabs button.active { background:var(--accent); color:#08130d; border-color:var(--accent); font-weight:600; }
  #legend { display:flex; gap:14px; flex-wrap:wrap; margin-top:10px; font-size:12px; color:var(--muted); }
  #legend .k { display:flex; align-items:center; gap:6px; }
  #legend .sw { width:12px; height:12px; border-radius:3px; display:inline-block; }
  .charts { display:flex; flex-direction:column; gap:14px; }
  canvas { max-height:210px; }
</style>
</head>
<body>
<header>
  <h1>Agri<span>Pulse</span></h1>
  <div class="sub">Sirhind Canal command pilot · Rabi 2025-26 · 8-day composites</div>
  <div class="badge" id="mode"></div>
</header>

<div class="cards" id="cards"></div>

<div class="grid">
  <div class="panel">
    <h2>Pilot Area Maps</h2>
    <div class="tabs" id="tabs"></div>
    <div id="map"></div>
    <div id="legend"></div>
  </div>
  <div class="charts">
    <div class="panel"><h2>Crop NDVI Trajectories (season)</h2><canvas id="ndviChart"></canvas></div>
    <div class="panel"><h2>Canopy Water (NDWI)</h2><canvas id="ndwiChart"></canvas></div>
    <div class="panel"><h2>Weather — ET₀ demand vs rainfall (mm / 8 days)</h2><canvas id="wxChart"></canvas></div>
  </div>
</div>

<script>
const LAYERS = [
  { key:"crop",     title:"Crop Type",  img:"/outputs/crop_map.png" },
  { key:"stress",   title:"Moisture Stress", img:"/outputs/stress_map.png" },
  { key:"advisory", title:"Irrigation Advisory", img:"/outputs/advisory_map.png" },
  { key:"ndvi",     title:"NDVI (latest)", img:"/outputs/ndvi_latest.png" },
];

async function main() {
  const s = await (await fetch("/outputs/summary.json")).json();
  document.getElementById("mode").textContent =
    (s.mode === "sample" ? "SAMPLE DATA MODE" : "GEE LIVE DATA") +
    " · analysis: " + (s.analysis_date || s.dates[s.dates.length-1]);

  const stressed = (s.stress_pct["Moderate"]||0) + (s.stress_pct["Severe"]||0);
  const urgent = s.advisory_pct["Irrigate now (~50 mm)"] || 0;
  const cards = [
    ["Classification OA", (s.metrics.overall_accuracy*100).toFixed(1)+"%"],
    ["Kappa", s.metrics.kappa.toFixed(3)],
    ["Cropped area stressed", stressed.toFixed(1)+"%"],
    ["Mean 8-day deficit", s.mean_deficit_mm+" mm"],
    ["Fields to irrigate now", urgent.toFixed(1)+"%"],
  ];
  document.getElementById("cards").innerHTML = cards.map(
    ([l,v]) => `<div class="card"><div class="l">${l}</div><div class="v">${v}</div></div>`).join("");

  // --- map ---
  const [w,so,e,n] = s.bounds, bounds = [[so,w],[n,e]];
  const map = L.map("map").fitBounds(bounds);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    { attribution:"© OpenStreetMap", opacity:0.75 }).addTo(map);
  const overlays = {};
  LAYERS.forEach(l => overlays[l.key] = L.imageOverlay(l.img, bounds));

  const legends = { crop:s.legends.crop, stress:s.legends.stress, advisory:s.legends.advisory,
                    ndvi:{ "low NDVI":"#d73027", "high NDVI":"#1a9850" } };
  const tabs = document.getElementById("tabs");
  LAYERS.forEach((l,i) => {
    const b = document.createElement("button");
    b.textContent = l.title;
    b.onclick = () => show(l.key, b);
    tabs.appendChild(b);
    if (i===0) show(l.key, b);
  });
  function show(key, btn) {
    Object.values(overlays).forEach(o => map.removeLayer(o));
    overlays[key].addTo(map);
    [...tabs.children].forEach(x => x.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("legend").innerHTML = Object.entries(legends[key]).map(
      ([name,c]) => `<span class="k"><span class="sw" style="background:${c}"></span>${name}</span>`).join("");
  }

  // --- charts ---
  Chart.defaults.color = "#8fa89b";
  Chart.defaults.borderColor = "#24332c";
  const lines = metric => Object.entries(s.timeseries).map(([name,d]) => ({
    label:name, data:d[metric], borderColor:d.color, backgroundColor:d.color,
    tension:.3, pointRadius:0, borderWidth:2 }));
  const lineOpts = { plugins:{legend:{labels:{boxWidth:10}}}, scales:{y:{grid:{color:"#1b2822"}}} };
  new Chart(document.getElementById("ndviChart"),
    { type:"line", data:{ labels:s.dates, datasets:lines("ndvi") }, options:lineOpts });
  new Chart(document.getElementById("ndwiChart"),
    { type:"line", data:{ labels:s.dates, datasets:lines("ndwi") }, options:lineOpts });
  new Chart(document.getElementById("wxChart"), { type:"bar",
    data:{ labels:s.dates, datasets:[
      { label:"Rainfall", data:s.weather.rain, backgroundColor:"#4f9cd8" },
      { label:"ET₀", data:s.weather.et0, type:"line", borderColor:"#f9a825",
        backgroundColor:"#f9a825", tension:.3, pointRadius:0, borderWidth:2 },
    ]}, options:lineOpts });
}
main();
</script>
</body>
</html>
