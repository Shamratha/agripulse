# Fly.io config for the AgriPulse dashboard.
# Deploy from this directory (no GitHub repo required — flyctl ships the folder):
#   flyctl launch --copy-config --now   (first time; may rename the app if taken)
#   flyctl deploy                        (subsequent updates)
app = "agripulse"
primary_region = "bom"   # Mumbai — closest to India-based judges

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  # Scale to zero when idle, wake on request (~1-3s — far faster than a sleeping
  # Render service). For zero cold start, set min_machines_running = 1.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[env]
  AGRIPULSE_OUTPUTS = "demo_outputs"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"   # a static-file server needs very little
